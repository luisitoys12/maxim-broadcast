name: CI

on:
  push:
    branches: [master, 'release/**']
    paths-ignore: ['**.md', 'assets/**']
  pull_request:
    branches: [master]
    paths-ignore: ['**.md', 'assets/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Node ${{ matrix.node }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node: ['18', '20']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Lint (basic syntax check)
        run: cd backend && node --check src/index.js src/routes/api.js src/controllers/*.js src/middleware/*.js src/websocket/socketHandler.js

      - name: Health check (start server + ping)
        run: |
          cd backend
          cp .env.example .env
          node src/index.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:4000/health || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID

  frontend:
    name: Frontend Build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build (Vite)
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  all-green:
    name: All checks passed
    needs: [backend, frontend]
    runs-on: ubuntu-22.04
    steps:
      - run: echo "CI passed ✅"
