name: Maxim Broadcast - Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  MAXIM_VERSION: '1.0.0'
  OBS_VERSION: '31.0.2'

jobs:
  # ============================================
  # WINDOWS BUILD (x64 & x86)
  # ============================================
  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [x64, x86]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          arch: ${{ matrix.arch == 'x64' && 'win64_msvc2022_64' || 'win32_msvc2022' }}

      - name: Configure CMake
        run: |
          cmake --preset windows-${{ matrix.arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_BROWSER=ON `
            -DENABLE_WEBSOCKET=ON `
            -DENABLE_VIRTUALCAM=ON `
            -DMAXIM_BROADCAST=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Create NSIS Installer
        run: |
          makensis /DARCH=${{ matrix.arch }} installer/windows/maxim-broadcast-installer.nsi

      - name: Create Portable ZIP
        run: |
          7z a maxim-broadcast-${{ env.MAXIM_VERSION }}-windows-${{ matrix.arch }}-portable.zip `
            ./build/Release/* `
            ./frontend/dist/* `
            ./backend/dist/*

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            maxim-broadcast-${{ env.MAXIM_VERSION }}-windows-${{ matrix.arch }}-setup.exe
            maxim-broadcast-${{ env.MAXIM_VERSION }}-windows-${{ matrix.arch }}-portable.zip

  # ============================================
  # macOS BUILD (Universal - Intel + Apple Silicon)
  # ============================================
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          brew install cmake ninja qt@6 swig mbedtls cmocka

      - name: Configure CMake (ARM64)
        run: |
          cmake --preset macos-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DENABLE_BROWSER=ON \
            -DENABLE_WEBSOCKET=ON \
            -DMAXIM_BROADCAST=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build Frontend & Backend
        run: |
          cd frontend && npm ci && npm run build && cd ..
          cd backend && npm ci && npm run build && cd ..

      - name: Create DMG
        run: |
          ./installer/macos/create-dmg.sh \
            --volname "Maxim Broadcast" \
            --background "installer/macos/dmg-background.png" \
            --window-size 600 400 \
            --icon "Maxim Broadcast.app" 150 200 \
            --app-drop-link 450 200 \
            maxim-broadcast-${{ env.MAXIM_VERSION }}-macos-universal.dmg \
            "build/Maxim Broadcast.app"

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: maxim-broadcast-${{ env.MAXIM_VERSION }}-macos-universal.dmg

  # ============================================
  # LINUX BUILD (DEB, RPM, AppImage)
  # ============================================
  build-linux:
    name: Linux (${{ matrix.format }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        format: [deb, rpm, appimage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libx264-dev libcurl4-openssl-dev \
            libmbedtls-dev libgl1-mesa-dev libjansson-dev \
            libluajit-5.1-dev python3-dev \
            libx11-dev libxcb-randr0-dev libxcb-shm0-dev \
            libxcb-xinerama0-dev libxcb-composite0-dev \
            libxcomposite-dev libxinerama-dev \
            libqt6-dev qt6-base-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libpci-dev libwayland-dev

      - name: Configure CMake
        run: |
          cmake --preset linux-x86_64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DENABLE_BROWSER=ON \
            -DENABLE_WEBSOCKET=ON \
            -DENABLE_PIPEWIRE=ON \
            -DENABLE_WAYLAND=ON \
            -DMAXIM_BROADCAST=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build Frontend & Backend
        run: |
          cd frontend && npm ci && npm run build && cd ..
          cd backend && npm ci && npm run build && cd ..

      - name: Package DEB
        if: matrix.format == 'deb'
        run: |
          cd build && cpack -G DEB
          mv *.deb ../maxim-broadcast-${{ env.MAXIM_VERSION }}-linux-amd64.deb

      - name: Package RPM
        if: matrix.format == 'rpm'
        run: |
          sudo apt-get install -y rpm
          cd build && cpack -G RPM
          mv *.rpm ../maxim-broadcast-${{ env.MAXIM_VERSION }}-linux-x86_64.rpm

      - name: Package AppImage
        if: matrix.format == 'appimage'
        run: |
          wget -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          ./linuxdeploy --appdir AppDir \
            --executable build/maxim-broadcast \
            --desktop-file installer/linux/maxim-broadcast.desktop \
            --icon-file installer/linux/maxim-broadcast.png \
            --output appimage
          mv Maxim_Broadcast*.AppImage maxim-broadcast-${{ env.MAXIM_VERSION }}-linux-x86_64.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.format }}
          path: maxim-broadcast-${{ env.MAXIM_VERSION }}-linux-*

  # ============================================
  # ANDROID BUILD (APK + AAB)
  # ============================================
  build-android:
    name: Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup NDK
        run: |
          sdkmanager "ndk;26.1.10909125"

      - name: Build Native Libraries
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMAXIM_VERSION=${{ env.MAXIM_VERSION }} \
            -Pndk.dir=$ANDROID_HOME/ndk/26.1.10909125

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk \
            ../maxim-broadcast-${{ env.MAXIM_VERSION }}-android-universal.apk

      - name: Build AAB (Play Store)
        run: |
          cd android
          ./gradlew bundleRelease
          cp app/build/outputs/bundle/release/app-release.aab \
            ../maxim-broadcast-${{ env.MAXIM_VERSION }}-android.aab

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            maxim-broadcast-${{ env.MAXIM_VERSION }}-android-universal.apk
            maxim-broadcast-${{ env.MAXIM_VERSION }}-android.aab

  # ============================================
  # iOS BUILD (IPA)
  # ============================================
  build-ios:
    name: iOS
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -workspace MaximBroadcast.xcworkspace \
            -scheme MaximBroadcast \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/MaximBroadcast.xcarchive \
            archive

      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/MaximBroadcast.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist installer/ios/ExportOptions.plist
          cp build/export/MaximBroadcast.ipa \
            ../maxim-broadcast-${{ env.MAXIM_VERSION }}-ios.ipa

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: maxim-broadcast-${{ env.MAXIM_VERSION }}-ios.ipa

  # ============================================
  # CREATE GITHUB RELEASE
  # ============================================
  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate Checksums
        run: |
          cd release-artifacts
          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.apk" -o -name "*.aab" -o -name "*.ipa" \) -exec sha256sum {} \; > ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.MAXIM_VERSION }}
          name: "Maxim Broadcast v${{ env.MAXIM_VERSION }} - Lanzamiento Oficial"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/windows-x64/*
            release-artifacts/windows-x86/*
            release-artifacts/macos-universal/*
            release-artifacts/linux-deb/*
            release-artifacts/linux-rpm/*
            release-artifacts/linux-appimage/*
            release-artifacts/android/*
            release-artifacts/ios/*
            SHA256SUMS.txt
