name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'beta*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build
        continue-on-error: true

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
        continue-on-error: true

      - name: Package Windows
        run: |
          mkdir package
          if (Test-Path backend\dist) { xcopy /E /I backend\dist package\backend }
          if (Test-Path frontend\build) { xcopy /E /I frontend\build package\frontend }
          copy README.md package\
          copy RELEASE_NOTES.md package\

      - name: Create ZIP
        run: |
          Compress-Archive -Path package\* -DestinationPath maxim-broadcast-1.0.0-beta-windows-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: maxim-broadcast-1.0.0-beta-windows-${{ matrix.arch }}.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install system dependencies
        run: |
          brew install cmake pkg-config qt@5 mbedtls speexdsp
        continue-on-error: true

      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build
        continue-on-error: true

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Package macOS
        run: |
          mkdir -p package/Maxim_Broadcast.app/Contents/MacOS
          mkdir -p package/Maxim_Broadcast.app/Contents/Resources
          
          if [ -d "backend/dist" ]; then
            cp -r backend/dist package/Maxim_Broadcast.app/Contents/Resources/backend
          fi
          
          if [ -d "frontend/build" ]; then
            cp -r frontend/build package/Maxim_Broadcast.app/Contents/Resources/frontend
          fi
          
          cp README.md package/Maxim_Broadcast.app/Contents/Resources/
          
          cat > package/Maxim_Broadcast.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>MaximBroadcast</string>
              <key>CFBundleIdentifier</key>
              <string>com.estacionkusmedia.maxim-broadcast</string>
              <key>CFBundleName</key>
              <string>Maxim Broadcast</string>
              <key>CFBundleVersion</key>
              <string>1.0.0-beta</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create -volname "Maxim Broadcast" -srcfolder package -ov -format UDZO maxim-broadcast-1.0.0-beta-macos-universal.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: maxim-broadcast-1.0.0-beta-macos-universal.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git qtbase5-dev libmbedtls-dev \
            libjansson-dev libspeexdsp-dev rpm
        continue-on-error: true

      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Package DEB
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/share/maxim-broadcast/backend
          mkdir -p package/usr/share/maxim-broadcast/frontend
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/doc/maxim-broadcast
          
          if [ -d "backend/dist" ]; then
            cp -r backend/dist/* package/usr/share/maxim-broadcast/backend/
          fi
          
          if [ -d "frontend/build" ]; then
            cp -r frontend/build/* package/usr/share/maxim-broadcast/frontend/
          fi
          
          cp README.md package/usr/share/doc/maxim-broadcast/
          cp RELEASE_NOTES.md package/usr/share/doc/maxim-broadcast/
          
          cat > package/DEBIAN/control << EOF
          Package: maxim-broadcast
          Version: 1.0.0-beta
          Architecture: amd64
          Maintainer: EstacionKusMedia <luisitoys12@github.com>
          Description: Software Profesional de TV Playout y Producción en Vivo
           Maxim Broadcast es una plataforma avanzada de producción audiovisual
           basada en OBS Studio, diseñada para operación desde navegador web.
          Depends: nodejs (>= 18)
          EOF
          
          cat > package/usr/share/applications/maxim-broadcast.desktop << EOF
          [Desktop Entry]
          Name=Maxim Broadcast
          Comment=Software Profesional de TV Playout
          Exec=/usr/share/maxim-broadcast/start.sh
          Icon=maxim-broadcast
          Terminal=false
          Type=Application
          Categories=AudioVideo;
          EOF
          
          cat > package/usr/share/maxim-broadcast/start.sh << 'EOF'
          #!/bin/bash
          cd /usr/share/maxim-broadcast/backend
          node index.js &
          sleep 2
          xdg-open http://localhost:3001
          EOF
          
          chmod +x package/usr/share/maxim-broadcast/start.sh
          
          dpkg-deb --build package maxim-broadcast-1.0.0-beta-linux-amd64.deb

      - name: Create TAR.GZ
        run: |
          mkdir -p maxim-broadcast
          if [ -d "backend/dist" ]; then
            cp -r backend/dist maxim-broadcast/backend
          fi
          if [ -d "frontend/build" ]; then
            cp -r frontend/build maxim-broadcast/frontend
          fi
          cp README.md RELEASE_NOTES.md BUILD_INSTRUCTIONS.md maxim-broadcast/ 2>/dev/null || true
          
          cat > maxim-broadcast/start.sh << 'EOF'
          #!/bin/bash
          cd backend
          node index.js &
          sleep 2
          echo "Maxim Broadcast backend iniciado en http://localhost:3001"
          echo "Abre frontend/index.html en tu navegador"
          EOF
          
          chmod +x maxim-broadcast/start.sh
          tar -czf maxim-broadcast-1.0.0-beta-linux-amd64.tar.gz maxim-broadcast

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            maxim-broadcast-1.0.0-beta-linux-amd64.deb
            maxim-broadcast-1.0.0-beta-linux-amd64.tar.gz

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend for Android
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Create Android Package Info
        run: |
          mkdir -p android-package
          cp -r frontend/build android-package/webview-assets
          
          cat > android-package/README.md << 'EOF'
          # Maxim Broadcast Android Package
          
          ## Contenido
          - `webview-assets/` - Frontend web compilado para WebView de Android
          
          ## Para crear APK completo:
          
          1. Crear proyecto Android Studio con WebView
          2. Copiar `webview-assets` a `app/src/main/assets/`
          3. Configurar WebView para cargar `file:///android_asset/index.html`
          4. Compilar APK: `./gradlew assembleRelease`
          
          ## Permisos necesarios en AndroidManifest.xml:
          ```xml
          <uses-permission android:name="android.permission.INTERNET" />
          <uses-permission android:name="android.permission.CAMERA" />
          <uses-permission android:name="android.permission.RECORD_AUDIO" />
          ```
          EOF
          
          zip -r maxim-broadcast-1.0.0-beta-android-webview.zip android-package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-package
          path: maxim-broadcast-1.0.0-beta-android-webview.zip

  create-release:
    name: Upload to Release
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure
        run: ls -R

      - name: Upload to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          files: |
            windows-x64/*.zip
            windows-x86/*.zip
            macos-universal/*.dmg
            linux-packages/*.deb
            linux-packages/*.tar.gz
            android-package/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}