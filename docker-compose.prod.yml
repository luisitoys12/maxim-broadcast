services:
  maxim-broadcast:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: maxim-broadcast-prod
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-demo-secret-change-in-production}
      DB_TYPE: sqlite
      DB_PATH: ./db/maxim.db
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
      DEMO_MODE: ${DEMO_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - maxim-db:/app/backend/db
      - maxim-uploads:/app/backend/uploads
      - maxim-logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  maxim-db:
  maxim-uploads:
  maxim-logs:
